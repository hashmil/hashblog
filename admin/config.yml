backend:
  name: git-gateway
  branch: main
  local_backend: true

media_folder: "public/media"
public_folder: "/media"

collections:
  - name: "blog"
    label: "Blog Posts"
    label_singular: "Blog Post"
    folder: "src/content/blog"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    path: "{{year}}-{{month}}-{{day}}-{{slug}}/index.mdx"
    preview_path: "{{year}}/{{month}}/{{slug}}"
    fields:
      - {label: "Title", name: "title", widget: "string", required: true}
      - {label: "Description", name: "description", widget: "string", required: true}
      - {label: "Publish Date", name: "pubDate", widget: "datetime", date_format: "YYYY-MM-DD", time_format: "HH:mm", required: true}
      - {label: "Updated Date", name: "updatedDate", widget: "datetime", date_format: "YYYY-MM-DD", time_format: "HH:mm", required: false}
      - {label: "Hero Image", name: "heroImage", widget: "image", required: false}
      - {label: "Preview Image", name: "preview", widget: "image", required: false}
      - {label: "Tags", name: "tags", widget: "list", required: false, default: []}
      - {label: "Draft", name: "draft", widget: "boolean", default: false}
      - {label: "Body", name: "body", widget: "markdown"}
